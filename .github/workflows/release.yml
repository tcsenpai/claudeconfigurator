name: release

# Build native bundles for every platform and attach them to the GitHub
# release when a v* tag is pushed. Uses tauri-action, which builds the app
# and uploads the artifacts to the (draft) release for the tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          - platform: macos-latest      # Intel
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux bundling dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ClaudeConfigurator ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
